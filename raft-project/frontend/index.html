<!DOCTYPE html>
<html>
<head>
  <title>Distributed Drawing Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    body {
      background: #5b9bd5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      font-family: sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    h2 {
      font-family: 'Pacifico', cursive;
      color: white;
      font-size: 2.4rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-shadow: 2px 3px 0px rgba(0,0,0,0.15);
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    }

    #status {
      margin-top: 10px;
      color: white;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h2> Drawing Board</h2>

<div id="controls">
  <label>Color:</label>
  <input type="color" id="colorPicker" value="#000000">

  <label>Brush Size:</label>
  <input type="range" id="brushSize" min="1" max="20" value="2">

  <div id="eraserControls" style="display:none;">
    <label>Eraser Size:</label>
    <input type="range" id="eraserSize" min="5" max="40" value="10">
  </div>

  <button onclick="setPen()">Pen</button>
  <button onclick="setEraser()">Eraser</button>
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="undo()">Undo</button>
</div>

<canvas id="canvas" width="800" height="500"></canvas>
<div id="status">Connecting...</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function getWsUrl() {
  const protocol = location.protocol === "https:" ? "wss" : "ws";
  return `${protocol}://${location.hostname}:3000`;
}

const ws = new WebSocket(getWsUrl());
const statusEl = document.getElementById("status");

let drawing = false;
let lastX = 0;
let lastY = 0;

let color = "#000000";
let brushSize = 2;
let eraserSize = 10;
let isEraser = false;

let strokes = [];
let currentStroke = [];
let currentStrokeId = null;

const clientId = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());

document.getElementById("colorPicker").oninput = (e) => {
  color = e.target.value;
  setPen();
};

document.getElementById("brushSize").oninput = (e) => {
  brushSize = Number(e.target.value);
};

document.getElementById("eraserSize").oninput = (e) => {
  eraserSize = Number(e.target.value);
};

function setEraser() {
  isEraser = true;
  document.getElementById("eraserControls").style.display = "inline";
}

function setPen() {
  isEraser = false;
  document.getElementById("eraserControls").style.display = "none";
}

function makeStrokeId() {
  return `${clientId}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
}

canvas.addEventListener("mousedown", (e) => {
  drawing = true;
  lastX = e.offsetX;
  lastY = e.offsetY;
  currentStroke = [];
  currentStrokeId = makeStrokeId();
});

canvas.addEventListener("mouseup", () => {
  if (drawing && currentStroke.length > 0) {
    strokes.push(currentStroke);
  }
  drawing = false;
  currentStroke = [];
  currentStrokeId = null;
});

canvas.addEventListener("mouseleave", () => {
  drawing = false;
  currentStroke = [];
  currentStrokeId = null;
  canvas.style.cursor = "default";
});

canvas.addEventListener("mousemove", (e) => {
  if (isEraser) {
    const size = eraserSize;
    canvas.style.cursor = `url('data:image/svg+xml;utf8,
      <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${size/2 - 2}" 
        fill="rgba(255,255,255,0.3)" stroke="black" stroke-width="2"/>
      </svg>') ${size/2} ${size/2}, auto`;
  } else {
    canvas.style.cursor = "default";
  }

  if (!drawing || ws.readyState !== 1 || !currentStrokeId) return;

  const size = isEraser ? eraserSize : brushSize;

  const data = {
    type: "draw",
    clientId,
    strokeId: currentStrokeId,
    x: e.offsetX,
    y: e.offsetY,
    prevX: lastX,
    prevY: lastY,
    color: isEraser ? "eraser" : color,
    size: size
  };

  drawLine(data);
  currentStroke.push(data);
  ws.send(JSON.stringify(data));

  lastX = e.offsetX;
  lastY = e.offsetY;
});

function drawLine(data) {
  if (!data || data.type !== "draw") return;

  const { x, y, prevX, prevY, color, size } = data;

  ctx.lineWidth = size;
  ctx.lineCap = "round";

  if (color === "eraser") {
    ctx.globalCompositeOperation = "destination-out";
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = color;
  }

  ctx.beginPath();
  ctx.moveTo(prevX, prevY);
  ctx.lineTo(x, y);
  ctx.stroke();
}

function redrawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalCompositeOperation = "source-over";

  strokes.forEach(stroke => {
    stroke.forEach(segment => drawLine(segment));
  });
}

function clearCanvas() {
  strokes = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: "clear",
      clientId
    }));
  }
}

function undo() {
  if (ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: "undo",
      clientId
    }));
  }
}

ws.onopen = () => {
  statusEl.textContent = `Connected to ${getWsUrl()}`;
};

ws.onclose = () => {
  statusEl.textContent = "Disconnected";
};

ws.onerror = () => {
  statusEl.textContent = "Connection error";
};

ws.onmessage = (event) => {
  const data = JSON.parse(event.data);

  if (data.type === "snapshot") {
    strokes = Array.isArray(data.strokes) ? data.strokes : [];
    redrawAll();
    return;
  }

  if (data.type === "clear") {
    strokes = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }

  if (data.type === "undo") {
    for (let i = strokes.length - 1; i >= 0; i--) {
      if (strokes[i].length > 0 && strokes[i][0].clientId === data.clientId) {
        strokes.splice(i, 1);
        break;
      }
    }
    redrawAll();
    return;
  }

  if (data.type === "draw") {
    drawLine(data);

    let lastStroke = strokes[strokes.length - 1];
    if (
      !lastStroke ||
      lastStroke.length === 0 ||
      lastStroke[0].strokeId !== data.strokeId
    ) {
      lastStroke = [];
      strokes.push(lastStroke);
    }
    lastStroke.push(data);
  }
};
</script>

</body>
</html>
